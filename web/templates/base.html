<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <!-- HTMX and Chart.js from CDN. No integrity attrs since they have to be
       valid hashes; we'll self-host these on the LXC in a future pass for
       offline reliability and supply-chain safety. -->
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
          crossorigin="anonymous"></script>
</head>
<body>
  <nav class="topnav">
    <a class="brand" href="/">{{ site_title }}</a>
    <div class="nav-links">
      <a href="/">Dashboard</a>
      <a href="/rankings">Rankings</a>
      <a href="/raffles">Raffles</a>
      <a href="/traders">Traders</a>
      <a href="/trends">Trends</a>
    </div>
    <form class="user-picker" autocomplete="off"
          onsubmit="event.preventDefault(); const inp = this.querySelector('input[name=q]');
                   if (inp.value.trim()) window.location.href = '/u/' + (inp.value.startsWith('@') ? inp.value : '@' + inp.value);">
      <input type="text" name="q" placeholder="Find a player… (e.g. @jeffk42)"
             hx-get="/api/users/search"
             hx-trigger="keyup changed delay:200ms"
             hx-target="#user-search-results" />
      <ul id="user-search-results" class="search-results"></ul>
    </form>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>{{ site_title }}</span>
    <span class="muted">·</span>
    <span class="muted">Trade week ending {{ current_week_ending.strftime('%b %-d, %Y %H:%M UTC') }}
      · {{ time_remaining }} remaining</span>
  </footer>

  <script>
    // Close the search dropdown when clicking outside the picker, or on Escape.
    (function() {
      const picker = document.querySelector('.user-picker');
      const results = document.getElementById('user-search-results');
      if (!picker || !results) return;
      document.addEventListener('click', function(e) {
        if (!picker.contains(e.target)) results.innerHTML = '';
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          results.innerHTML = '';
          const inp = picker.querySelector('input[name=q]');
          if (inp) inp.blur();
        }
      });
    })();
  </script>
</body>
</html>
